<!DOCTYPE html>
<html>
<head>
    <title>My Activity | Study Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #121212;
            color: white;
        }

        .timeline {
            border-left: 3px solid #00d4ff;
            padding-left: 20px;
        }

        .activity-item {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .timestamp {
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <h3 class="mb-4">📜 My Activity History</h3>

    <div class="timeline">

        {% if logs|length == 0 %}
            <p>No activity yet.</p>
        {% else %}
            {% for log in logs %}
                <div class="activity-item">
                    <strong>{{ log.action }}</strong>
                    <div class="timestamp">
                        {{ log.timestamp }}
                    </div>
                </div>
            {% endfor %}
        {% endif %}

    </div>

    <a href="/dashboard" class="btn btn-info mt-4">Back to Dashboard</a>
</div>

</body>
</html>
