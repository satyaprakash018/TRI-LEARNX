<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} | PDF Preview</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <a class="btn back-btn" href="/materials">
            ← Back to Materials
        </a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">
            Dashboard
        </a>
    </div>
</nav>

<!-- PREVIEW CONTENT -->
<div class="container mt-4 fade-in">

    <div class="card shadow">
        <div class="card-body">

            <h4>{{ title }}</h4>
            <p class="text-muted">Subject: {{ subject }}</p>

            <!-- PDF PREVIEW -->
            <iframe src="/material/{{ file_id }}"
                    width="100%"
                    height="600px"
                    style="border-radius: 12px; border: none;">
            </iframe>

            <!-- DOWNLOAD BUTTON -->
            <div class="text-end mt-3">
                <a href="/material/{{ file_id }}"
                   class="btn btn-success"
                   download>
                    ⬇ Download PDF
                </a>
            </div>

            <!-- 🚀 AI SUMMARY FEATURE -->
            <hr>

            <h5>🤖 AI Summary</h5>

            <button onclick="generateSummary()" class="btn btn-warning">
                Generate Summary
            </button>

            <!-- OUTPUT BOX -->
            <div id="summaryBox" class="alert alert-info mt-3" style="white-space: pre-line;"></div>

        </div>
    </div>

</div>

<!-- JS -->
<script>
function generateSummary() {
    const box = document.getElementById("summaryBox");

    box.style.display = "block";
    box.innerText = "⏳ Generating summary...";

    fetch("/generate-summary", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            file_id: "{{ file_id }}"
        })
    })
    .then(res => res.json())
    .then(data => {
        box.innerText = data.summary;
    })
    .catch(() => {
        box.innerText = "❌ Error generating summary";
    });
}
</script>

</body>
</html>
