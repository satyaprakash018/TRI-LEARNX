<!DOCTYPE html>
<html>
<head>
    <title>Manage Users | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .admin-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 30px;
        }

        .table th {
            background: #212529;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="admin-card">

        <h3 class="mb-4">👥 User Management Panel</h3>

        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>College</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.college }}</td>
                    <td>
                        {% if user.role == "admin" %}
                            <span class="badge bg-danger">Admin</span>
                        {% else %}
                            <span class="badge bg-secondary">User</span>
                        {% endif %}
                    </td>
                    <td>
                        <a href="/admin/delete-user/{{ user._id }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this user?');">
                           Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/dashboard" class="btn btn-dark mt-3">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
