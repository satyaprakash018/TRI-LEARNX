<!DOCTYPE html>
<html>
<head>
    <title>My Profile | Trident Study Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: white;
        }

        .glass-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00d4ff;
        }

        .btn-custom {
            border-radius: 30px;
        }

        .form-control {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="glass-card">

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} text-center">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="row">

            <!-- LEFT SIDE -->
            <div class="col-md-4 text-center">
                <a href="/dashboard"
                   class="btn btn-primary btn-custom w-100 mb-3">
                   Back to Dashboard
                </a>

                <img src="/profile-pic/{{ user._id }}"
                     class="profile-pic mb-3"
                     onerror="this.src='/static/default.png'">

                <h4>{{ user.name }}</h4>
                <p class="text-light small">{{ user.email }}</p>

                <form action="/upload-profile-pic" method="POST" enctype="multipart/form-data">
                    <input type="file" name="profile_pic" class="form-control mb-2" required>
                    <button class="btn btn-info btn-sm btn-custom w-100">Upload Picture</button>
                </form>

                <a href="/delete-account"
                   class="btn btn-danger btn-sm btn-custom w-100 mt-3"
                   onclick="return confirm('Are you sure?');">
                   Delete Account
                </a>
            </div>

            <!-- RIGHT SIDE -->
            <div class="col-md-8">

                <h5 class="mb-3">Update Profile</h5>

                <form method="POST" action="/update-profile">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <input type="text" name="name"
                                   value="{{ user.name }}"
                                   class="form-control"
                                   placeholder="Full Name" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="text" name="college"
                                   value="{{ user.college }}"
                                   class="form-control"
                                   placeholder="College">
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="text" name="branch"
                                   value="{{ user.branch }}"
                                   class="form-control"
                                   placeholder="Branch">
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="text" name="year"
                                   value="{{ user.year }}"
                                   class="form-control"
                                   placeholder="Year">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success btn-custom w-100">
                        Save Changes
                    </button>
                </form>

                <hr class="my-4 text-light">

                <h5 class="mb-3">Change Password</h5>

                <form method="POST" action="/change-password">
                    <input type="password"
                           name="current_password"
                           class="form-control mb-3"
                           placeholder="Current Password" required>

                    <input type="password"
                           name="new_password"
                           class="form-control mb-3"
                           placeholder="New Password" required>

                    <button class="btn btn-warning btn-custom w-100">
                        Update Password
                    </button>
                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
